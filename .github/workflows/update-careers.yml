name: Update Careers Data

on:
  schedule:
    - cron: "0 8 * * *"   # Runs daily at 8am UTC (2 hours after education)
  workflow_dispatch:      # Allows manual run from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase==2.8.0

      - name: Run Careers Update Script
        run: python scripts/update_careers.py